<title>UserBase – Database System with User Login & Record Management</title>
<!--
  Assignment 2 – Database System with User Login and Record Management
  ====================================================================
  Steps covered:
    Step 1 – Excel import → auto-generate credentials → simulate email
    Step 2 – Login, view, edit, delete own record
    Step 3 – Registration with OTP email verification
    Step 4 – First-login forced password change

  Stack: Vanilla HTML/CSS/JS (zero dependencies except SheetJS for Excel)
  Database: In-memory JS object (production: replace with PostgreSQL/MySQL)
  Email: Simulated via console.log (production: replace with SendGrid/Nodemailer)
-->

<style>

/* ── Modal ───────────────────────────────────────────────────── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }

/* ── Auth ────────────────────────────────────────────────────── */

/* ── OTP ─────────────────────────────────────────────────────── */

.otp-row input { width: 46px; text-align: center; font-size: 22px; font-weight: 700; font-family: 'DM Mono', monospace; padding: 10px 0; border-radius: 8px; }

/* ── Password strength ───────────────────────────────────────── */
.pw-bar { height: 4px; border-radius: 2px; background: var(--border); margin-top: 6px; overflow: hidden; }

/* ── Upload zone ─────────────────────────────────────────────── */

@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

<body>
<div id="root"></div>
<script>
"use strict";
/* ════════════════════════════════════════════════════════════════
   DATABASE  (In-memory – replace with real DB in production)
   Schema mirrors the SQL schema defined in docs/database_schema.sql
   ════════════════════════════════════════════════════════════════ */
const DB = {
  users:       [],   // Table: users
  otps:        {},   // Temp store: email → {code, data, exp}
  sessions:    {},   // Map: token → userId
  nextId:      1,
};

/* ════════════════════════════════════════════════════════════════
   UTILITIES
   ════════════════════════════════════════════════════════════════ */
const genId       = () => DB.nextId++;
const genToken    = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
const genOTP      = () => String(100000 + Math.floor(Math.random() * 900000));
const initials    = n => n.split(" ").map(w=>w[0]||"").slice(0,2).join("").toUpperCase();
const fmtDate     = d => new Date(d).toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"});

function genUsername(first, last) {
  const base = (first[0] + last).toLowerCase().replace(/[^a-z]/g,"");
  return base + String(10 + Math.floor(Math.random() * 89));
}
function genPassword() {
  const u="ABCDEFGHJKLMNPQRSTUVWXYZ", l="abcdefghjkmnpqrstuvwxyz", d="23456789", s="@#!";
  const pick = str => str[Math.floor(Math.random()*str.length)];
  return [pick(u),pick(u),pick(l),pick(l),pick(l),pick(d),pick(d),pick(s),pick(l),pick(d)].sort(()=>Math.random()-0.5).join("");
}
function hashPw(pw) { return btoa(unescape(encodeURIComponent(pw + ":ub_salt_2024"))); }
function verifyPw(pw, hash) { return hashPw(pw) === hash; }
function pwStrength(p) {
  return [p.length>=8, /[A-Z]/.test(p), /[0-9]/.test(p), /[^a-zA-Z0-9]/.test(p)].filter(Boolean).length;
}

/* ════════════════════════════════════════════════════════════════
   EMAIL SERVICE  (Simulated – replace with SendGrid / Nodemailer)
   ════════════════════════════════════════════════════════════════ */
function sendEmail(to, subject, body) {
  // In production: await sendgrid.send({ to, subject, text: body });
  console.log(`\n📧 EMAIL\nTo: ${to}\nSubject: ${subject}\n${body}\n${"─".repeat(50)}`);
}
function emailCredentials(user, password) {
  sendEmail(user.email, "Your UserBase Account Credentials",
    `Hello ${user.firstName},\n\nYour account has been created.\n\nUsername: ${user.username}\nPassword: ${password}\n\nPlease log in at http://localhost and change your password immediately.\n\nRegards,\nUserBase System`);
}
function emailOTP(email, otp) {
  sendEmail(email, "Your Verification Code",
    `Your one-time verification code is:\n\n  ${otp}\n\nThis code expires in 10 minutes.\nDo not share it with anyone.`);
}

/* ════════════════════════════════════════════════════════════════
   USER SERVICE
   ════════════════════════════════════════════════════════════════ */
const UserSvc = {
  create(data, isImport = false) {
    const username = genUsername(data.firstName, data.lastName);
    const password = genPassword();
    const user = {
      id:                 genId(),
      firstName:          data.firstName.trim(),
      lastName:           data.lastName.trim(),
      email:              data.email.trim().toLowerCase(),
      phone:              data.phone || "",
      role:               data.role || "Employee",
      department:         data.department || "",
      username,
      passwordHash:       hashPw(password),
      mustChangePassword: true,
      isActive:           true,
      source:             isImport ? "import" : "registration",
      createdAt:          new Date().toISOString(),
    };
    DB.users.push(user);
    emailCredentials(user, password);
    return { user, password };
  },

  importRows(rows) {
    return rows.map(row => {
      if (!row.firstName || !row.email) return { email: row.email||"?", status:"skipped", reason:"Missing required fields" };
      if (DB.users.find(u => u.email === row.email.toLowerCase())) return { email: row.email, status:"skipped", reason:"Email already exists" };
      const { user, password } = UserSvc.create(row, true);
      return { email: user.email, username: user.username, password, status: "created" };
    });
  },

  getAll()      { return [...DB.users]; },
  getById(id)   { return DB.users.find(u => u.id === id) || null; },
  getByLogin(q) { return DB.users.find(u => u.username === q || u.email === q) || null; },

  update(id, data) {
    const i = DB.users.findIndex(u => u.id === id);
    if (i < 0) return null;
    DB.users[i] = { ...DB.users[i], ...data, id };
    return DB.users[i];
  },
  delete(id) {
    const i = DB.users.findIndex(u => u.id === id);
    if (i < 0) return false;
    DB.users.splice(i, 1);
    return true;
  },
  changePassword(id, newPw) {
    return UserSvc.update(id, { passwordHash: hashPw(newPw), mustChangePassword: false });
  },

  sendOTP(email, data) {
    const otp = genOTP();
    DB.otps[email] = { otp, data, exp: Date.now() + 10*60*1000 };
    emailOTP(email, otp);
    return otp; // returned only for demo display
  },
  verifyOTP(email, code) {
    const rec = DB.otps[email];
    if (!rec)              return { ok:false, error:"No OTP found. Please request again." };
    if (Date.now()>rec.exp)return { ok:false, error:"OTP expired. Please request again." };
    if (rec.otp !== code)  return { ok:false, error:"Incorrect code. Please try again." };
    const data = rec.data;
    delete DB.otps[email];
    return { ok:true, data };
  },
};

/* ════════════════════════════════════════════════════════════════
   AUTH SERVICE
   ════════════════════════════════════════════════════════════════ */
const Auth = {
  currentUser: null,
  token:       null,

  login(login, password) {
    const user = UserSvc.getByLogin(login);
    if (!user)                    return { ok:false, error:"No account found with those credentials." };
    if (!verifyPw(password, user.passwordHash)) return { ok:false, error:"Incorrect password." };
    if (!user.isActive)           return { ok:false, error:"Your account is inactive." };
    const token = genToken();
    DB.sessions[token] = user.id;
    Auth.token = token;
    Auth.currentUser = user;
    return { ok:true, user };
  },
  logout() {
    if (Auth.token) delete DB.sessions[Auth.token];
    Auth.token = null;
    Auth.currentUser = null;
  },
  refresh() {
    if (!Auth.currentUser) return;
    Auth.currentUser = UserSvc.getById(Auth.currentUser.id);
  },
};

/* ════════════════════════════════════════════════════════════════
   SEED DATA  (pre-load demo users)
   ════════════════════════════════════════════════════════════════ */
(function seed() {
  // Admin account — no mustChangePassword for easy demo
  const admin = {
    id: genId(), firstName:"Admin", lastName:"User",
    email:"admin@userbase.com", phone:"+1-555-0000",
    role:"Administrator", department:"IT",
    username:"admin", passwordHash:hashPw("Admin@123"),
    mustChangePassword:false, isActive:true,
    source:"seed", createdAt:new Date().toISOString(),
  };
  DB.users.push(admin);
  // Regular demo users
  [
    {firstName:"Alice",  lastName:"Chen",     email:"alice@demo.com",  role:"Manager",   department:"Operations", phone:"+1-555-0101"},
    {firstName:"Bob",    lastName:"Martinez", email:"bob@demo.com",    role:"Analyst",   department:"Finance",    phone:"+1-555-0102"},
    {firstName:"Carol",  lastName:"Williams", email:"carol@demo.com",  role:"Engineer",  department:"IT",         phone:"+1-555-0103"},
  ].forEach(d => UserSvc.create(d));
  DB.nextId = 10;
})();

/* ════════════════════════════════════════════════════════════════
   APP STATE & RENDERER
   ════════════════════════════════════════════════════════════════ */
const S = {
  page:        "login",   // login|register|otp|change-pw|dashboard|users|import|profile|edit-user
  alert:       null,
  modal:       null,      // null | "view-user" | "add-user" | "change-pw" | object(user)
  editUser:    null,
  importRes:   null,
  otpEmail:    null,
  otpData:     null,
  devOTP:      null,
  search:      "",
};

function go(page, extra={}) { Object.assign(S, { page, alert:null, ...extra }); render(); }
function setS(patch)        { Object.assign(S, patch); render(); }

function showAlert(msg, type="info", ms=4000) {
  S.alert = {msg,type};
  render();
  if (ms) setTimeout(()=>{ S.alert=null; render(); }, ms);
}

/* ════════════════════════════════════════════════════════════════
   HTML HELPERS
   ════════════════════════════════════════════════════════════════ */
const alertHTML = () => S.alert
  ? `<div class="alert alert-${S.alert.type}">${S.alert.msg}</div>` : "";

const badgeRole = r => {
  const m = {Administrator:"navy",Manager:"teal",Director:"teal",Analyst:"navy",Engineer:"gray",Employee:"gray"};
  return `<span class="badge badge-${m[r]||"gray"}">${r}</span>`;
};
const badgeActive = a => `<span class="badge badge-${a?"teal":"red"}">${a?"Active":"Inactive"}</span>`;
const badgePW     = m => `<span class="badge badge-${m?"amber":"teal"}">${m?"Must Change":"Set"}</span>`;

/* ════════════════════════════════════════════════════════════════
   AUTH SCREENS
   ════════════════════════════════════════════════════════════════ */
function renderLogin() {
  return `<div class="auth-wrap"><div class="auth-card">
    <div class="auth-logo">User<span>Base</span></div>
    <div class="auth-sub">Sign in to your account</div>
    ${alertHTML()}
    <div class="form-group"><label>Username or Email</label>
      <input id="l-id" placeholder="admin  or  alice@demo.com" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="form-group"><label>Password</label>
      <input id="l-pw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:11px" onclick="doLogin()">Sign In →</button>
    <div class="divider"></div>
    <div style="text-align:center;font-size:13px;color:var(--text2)">

/* Auth */
function doLogin() {
  const id = v("l-id"), pw = v("l-pw");
  if (!id||!pw) { showAlert("Enter username and password","error"); return; }
  const r = Auth.login(id,pw);
  if (!r.ok) { showAlert(r.error,"error"); return; }
  go(r.user.mustChangePassword ? "change-pw" : "dashboard");
}
function doLogout() { Auth.logout(); go("login"); }

function doRequestOTP() {
  const fn=v("r-fn"), ln=v("r-ln"), em=v("r-em"), ph=v("r-ph"), dp=v("r-dp");
  if (!fn||!ln||!em) { showAlert("First name, last name and email are required","error"); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)) { showAlert("Invalid email address","error"); return; }
  if (DB.users.find(u=>u.email===em.toLowerCase())) { showAlert("This email is already registered","error"); return; }
  const data = {firstName:fn,lastName:ln,email:em,phone:ph,department:dp};
  const otp = UserSvc.sendOTP(em, data);
  setS({page:"otp", otpEmail:em, otpData:data, devOTP:otp, alert:null});
}
function doResendOTP() {
  if (!S.otpData) { go("register"); return; }
  const otp = UserSvc.sendOTP(S.otpEmail, S.otpData);
  setS({devOTP:otp});
  showAlert("Code resent!","success");
}
function doVerifyOTP() {
  const code = [0,1,2,3,4,5].map(i=>{ const el=document.getElementById(`otp${i}`); return el?el.value:""; }).join("");
  if (code.length<6) { showAlert("Enter all 6 digits","error"); return; }
  const r = UserSvc.verifyOTP(S.otpEmail, code);
  if (!r.ok) { showAlert(r.error,"error"); return; }
  const {user} = UserSvc.create(r.data);
  showAlert(`Account created! Your credentials have been sent to ${user.email}.`,"success",0);
  setTimeout(()=>go("login"),3000);
}
function doChangePW() {
  const a=v("cp-a"), b=v("cp-b");
  if (!a||a.length<8) { showAlert("Password must be at least 8 characters","error"); return; }
  if (a!==b) { showAlert("Passwords do not match","error"); return; }
  UserSvc.changePassword(Auth.currentUser.id, a);
  Auth.refresh();
  go("dashboard");
  showAlert("Password updated. Welcome!","success");
}
function doModalChangePW() {
  const a=v("mp-a"), b=v("mp-b");
  if (!a||a.length<8) { showAlert("Password must be at least 8 characters","error"); return; }
  if (a!==b) { showAlert("Passwords do not match","error"); return; }
  UserSvc.changePassword(Auth.currentUser.id, a);
  Auth.refresh();
  closeModal();
  showAlert("Password changed successfully!","success");
}

/* OTP keyboard helpers */
function otpFwd(i) {
  const el=document.getElementById(`otp${i}`);
  el.value=el.value.replace(/\D/g,"");
  if (el.value&&i<5) document.getElementById(`otp${i+1}`)?.focus();
}
function otpBck(e,i) {
  if (e.key==="Backspace"&&!document.getElementById(`otp${i}`)?.value&&i>0) document.getElementById(`otp${i-1}`)?.focus();
}

/* Password strength bar */
function pwBar(inputId, barId, lblId) {
  const s = pwStrength(v(inputId)||"");
  const w = s*25+"%";
  const cols=["","#dc2626","#d97706","#ca8a04","#16a34a"];
  const lbls=["","Weak","Fair","Good","Strong"];
  const bar=document.getElementById(barId), lbl=document.getElementById(lblId);
  if (bar) { bar.style.width=w; bar.style.background=cols[s]; }
  if (lbl) { lbl.textContent=lbls[s]||""; lbl.style.color=cols[s]; }
}

/* Users */
function viewUser(id) { const u=UserSvc.getById(id); if(u) setS({modal:u}); }
function editUser(id) { const u=UserSvc.getById(id); if(u) go("edit-user",{editUser:u,modal:null}); }
function deleteUser(id, fromEdit=false) {
  if (!confirm("Delete this user permanently?")) return;
  if (id === Auth.currentUser.id) { showAlert("You cannot delete your own admin account here. Use My Profile.","error"); return; }
  UserSvc.delete(id);
  showAlert("User deleted.","success");
  go("users",{modal:null,editUser:null});
}
function deleteOwnAccount() {
  if (!confirm("Delete your own account? You will be logged out.")) return;
  const id = Auth.currentUser.id;
  Auth.logout();
  UserSvc.delete(id);
  go("login");
}
function doAddUser() {
  const d={firstName:v("a-fn"),lastName:v("a-ln"),email:v("a-em"),phone:v("a-ph"),role:v("a-ro"),department:v("a-dp")};
  if (!d.firstName||!d.lastName||!d.email) { showAlert("First name, last name and email are required","error"); return; }
  if (DB.users.find(u=>u.email===d.email.toLowerCase())) { showAlert("Email already exists","error"); return; }
  const {user}=UserSvc.create(d);
  closeModal();
  showAlert(`User ${user.firstName} created. Credentials logged to console.`,"success");
  go("users");
}
function saveProfile() {
  const u=Auth.currentUser;
  UserSvc.update(u.id,{firstName:v("p-fn")||u.firstName,lastName:v("p-ln")||u.lastName,phone:v("p-ph"),department:v("p-dp")});
  Auth.refresh();
  showAlert("Profile updated!","success");
  render();
}
function saveEditUser(id) {
  UserSvc.update(id,{
    firstName:v("e-fn"),lastName:v("e-ln"),email:v("e-em"),
    phone:v("e-ph"),role:v("e-ro"),department:v("e-dp"),
    isActive:v("e-ac")==="true",
  });
  showAlert("User updated!","success");
  go("users",{editUser:null});
}
function openModal(m) { setS({modal:m}); }
function closeModal()  { setS({modal:null}); }

/* Excel */
function handleDrop(e) {
  e.preventDefault();
  document.getElementById("dz")?.classList.remove("over");
  const f=e.dataTransfer.files[0];
  if(f) processExcel(f);
}
function handleFile(input) { if(input.files[0]) processExcel(input.files[0]); }
function processExcel(file) {
  const reader=new FileReader();
  reader.onload=e=>{
    try {
      const wb=XLSX.read(e.target.result,{type:"binary"});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      if(!rows.length) { showAlert("No data found in file","error"); return; }
      const res=UserSvc.importRows(rows);
      S.importRes=res;
      showAlert(`Import complete: ${res.filter(r=>r.status==="created").length} users created.`,"success");
      render();
    } catch(err) { showAlert("Error reading file: "+err.message,"error"); }
  };
  reader.readAsBinaryString(file);
}

/* ── Helpers ────────────────────────────────────────────────────── */
function v(id) { return document.getElementById(id)?.value?.trim()||""; }

/* ════════════════════════════════════════════════════════════════
   RENDER
   ════════════════════════════════════════════════════════════════ */
function render() {
  const root=document.getElementById("root");
  if (!Auth.currentUser) {
    if (S.page==="register")  root.innerHTML=renderRegister();
    else if (S.page==="otp")  root.innerHTML=renderOTP();
    else                      root.innerHTML=renderLogin();
  } else if (Auth.currentUser.mustChangePassword && S.page!=="change-pw") {
    S.page="change-pw";
    root.innerHTML=renderChangePW();
  } else {
    root.innerHTML=renderApp();
  }
  // Re-attach OTP input listeners after DOM rebuild
  document.querySelectorAll(".otp-d").forEach((el,i)=>{
    el.addEventListener("input",()=>otpFwd(i));
  });
}

render();
