<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EASA Flight Dispatcher Quiz – AI Adaptive System</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #030712; font-family: 'Exo 2', sans-serif; }
    @keyframes twinkle   { from{opacity:0.2} to{opacity:1} }
    @keyframes fadeSlide { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulseGlow { 0%,100%{box-shadow:0 0 20px rgba(56,189,248,0.3)} 50%{box-shadow:0 0 40px rgba(56,189,248,0.7)} }
    @keyframes spin      { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes countUp   { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── Anthropic API ────────────────────────────────────────────────

const SYSTEM_PROMPT = `You are an expert aviation examiner for EASA Flight Dispatcher certification.
Generate adaptive quiz questions covering Aviation Navigation, Aviation Meteorology, and Flight Dispatcher concepts under EASA.

Return ONLY a valid JSON object:
{
  "question": "The question text",
  "options": ["A) option1", "B) option2", "C) option3", "D) option4"],
  "correct": "A",
  "explanation": "Brief explanation of the correct answer (2-3 sentences)",
  "topic": "Navigation|Meteorology|Flight Dispatcher"
}

Level difficulty:
- Levels 1-2: Basic definitions (VFR/IFR, cloud types, basic nav terms)
- Levels 3-4: Intermediate (chart reading, weather systems, NOTAMs, airspace classes)
- Levels 5-6: Applied (flight planning, meteorological minima, fuel calculations)
- Levels 7-8: Advanced scenarios (emergency procedures, complex airspace, severe weather)
- Levels 9-10: Expert (multi-factor decisions, regulatory edge cases, complex dispatch scenarios)

Return ONLY the JSON. No markdown, no preamble.`;

const EVAL_PROMPT = `You are an EASA aviation examiner. A student answered a quiz question.
Return ONLY valid JSON (no markdown):
{
  "correct": true or false,
  "feedback": "Concise educational explanation in 2-3 sentences"
}`;

async function callClaude(messages, system) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system, messages }),
  });
  const data = await res.json();
  return data.content?.map(b => b.text || "").join("") || "";
}

function safeJSON(text) {
  try { return JSON.parse(text.replace(/```json|```/g,"").trim()); }
  catch { return null; }
}

// ─── UI Components ────────────────────────────────────────────────

function Stars({ count = 40 }) {
  const list = useRef(
    Array.from({length: count}, (_,i) => ({
      id: i,
      x: Math.random()*100, y: Math.random()*100,
      size: Math.random()*2+0.5,
      delay: Math.random()*4,
    }))
  ).current;
  return (
    <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0}}>
      {list.map(s => (
        <div key={s.id} style={{
          position:"absolute", left:`${s.x}%`, top:`${s.y}%`,
          width:s.size, height:s.size, borderRadius:"50%",
          background:"rgba(255,255,255,0.7)",
          animation:`twinkle 3s ${s.delay}s infinite alternate`,
        }}/>
      ))}
    </div>
  );
}

function ProgressBar({ answered }) {
  return (
    <div style={{display:"flex",gap:6,marginBottom:16}}>
      {Array.from({length:10},(_,i) => (
        <div key={i} style={{
          flex:1, height:6, borderRadius:3,
          background: i < answered ? "linear-gradient(90deg,#38bdf8,#818cf8)" : "rgba(255,255,255,0.1)",
          transition:"background 0.4s",
          boxShadow: i < answered ? "0 0 8px rgba(56,189,248,0.6)" : "none",
        }}/>
      ))}
    </div>
  );
}

function TopicBadge({ topic }) {
  const map = {
    Navigation: {bg:"rgba(56,189,248,0.15)",border:"#38bdf8",text:"#38bdf8"},
    Meteorology: {bg:"rgba(129,140,248,0.15)",border:"#818cf8",text:"#818cf8"},
    "Flight Dispatcher": {bg:"rgba(251,191,36,0.15)",border:"#fbbf24",text:"#fbbf24"},
  };
  const c = map[topic] || map["Flight Dispatcher"];
  return (
    <span style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",background:c.bg,border:`1px solid ${c.border}`,color:c.text}}>
      {topic}
    </span>
  );
}

// ─── Main Component ───────────────────────────────────────────────

function QuizApp() {
  const [screen, setScreen]           = useState("intro");
  const [level, setLevel]             = useState(1);
  const [questionNum, setQuestionNum] = useState(0);
  const [currentQ, setCurrentQ]       = useState(null);
  const [loadingQ, setLoadingQ]       = useState(false);
  const [selected, setSelected]       = useState(null);
  const [feedback, setFeedback]       = useState(null);
  const [loadingFB, setLoadingFB]     = useState(false);
  const [score, setScore]             = useState(0);
  const [history, setHistory]         = useState([]);
  const [finalLevel, setFinalLevel]   = useState(1);
  const [error, setError]             = useState(null);
  const [animIn, setAnimIn]           = useState(false);

  // ── API calls ──────────────────────────────────────────────────

  async function loadQuestion(lvl) {
    setLoadingQ(true); setSelected(null); setFeedback(null); setError(null); setAnimIn(false);
    try {
      const raw = await callClaude(
        [{role:"user", content:`Generate a Level ${lvl}/10 EASA Flight Dispatcher certification question.`}],
        SYSTEM_PROMPT
      );
      const q = safeJSON(raw);
      if (!q || !q.question) throw new Error("bad format");
      setCurrentQ(q);
      setTimeout(() => setAnimIn(true), 50);
    } catch(e) {
      setError("Could not load question. Please check your connection or API key and try again.");
    }
    setLoadingQ(false);
  }

  async function submitAnswer(opt) {
    if (selected || loadingFB) return;
    setSelected(opt);
    setLoadingFB(true);
    const letter = opt.charAt(0);
    try {
      const raw = await callClaude(
        [{role:"user", content:`Question: ${currentQ.question}\nCorrect: ${currentQ.correct}\nStudent answered: ${letter}\nTopic: ${currentQ.topic}`}],
        EVAL_PROMPT
      );
      const r = safeJSON(raw);
      const isCorrect = r?.correct ?? (letter === currentQ.correct);
      const text = r?.feedback || currentQ.explanation;
      setFeedback({correct:isCorrect, text});
      if (isCorrect) setScore(s=>s+1);
      setHistory(h=>[...h,{level,topic:currentQ.topic,isCorrect}]);
    } catch {
      const isCorrect = letter === currentQ.correct;
      setFeedback({correct:isCorrect, text:currentQ.explanation});
      if (isCorrect) setScore(s=>s+1);
      setHistory(h=>[...h,{level,topic:currentQ.topic,isCorrect}]);
    }
    setLoadingFB(false);
  }

  // ── Navigation ─────────────────────────────────────────────────

  function startQuiz() {
    setLevel(1); setQuestionNum(0); setScore(0); setHistory([]);
    setScreen("quiz"); loadQuestion(1);
  }

  function nextQuestion() {
    const next = questionNum + 1;
    if (next >= 10) {
      setFinalLevel(Math.min(10, Math.max(1, score + (score > 5 ? 1 : 0))));
      setScreen("result"); return;
    }
    setQuestionNum(next);
    // Adaptive difficulty
    const recent = history.slice(-2);
    let newLvl = level;
    if (recent.length === 2) {
      const c = recent.filter(h=>h.isCorrect).length;
      if (c === 2 && level < 10) newLvl = level + 1;
      else if (c === 0 && level > 1) newLvl = level - 1;
    }
    setLevel(newLvl);
    loadQuestion(newLvl);
  }

  // ── Shared styles ──────────────────────────────────────────────

  const bg = {
    minHeight:"100vh",
    background:"linear-gradient(135deg,#030712 0%,#0c1445 50%,#030712 100%)",
    display:"flex", alignItems:"center", justifyContent:"center",
    fontFamily:"'Exo 2',sans-serif", position:"relative", overflow:"hidden",
  };

  // ── INTRO ──────────────────────────────────────────────────────
  if (screen === "intro") return (
    <div style={bg}>
      <Stars/>
      <div style={{position:"relative",zIndex:1,textAlign:"center",padding:40,maxWidth:640,animation:"fadeSlide 0.8s ease forwards"}}>
        <div style={{fontSize:64,marginBottom:16}}>✈️</div>
        <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:11,letterSpacing:6,color:"#38bdf8",marginBottom:16,fontWeight:700}}>EASA CERTIFICATION</div>
        <h1 style={{fontFamily:"'Orbitron',sans-serif",fontSize:42,fontWeight:900,color:"#fff",lineHeight:1.1,marginBottom:12,textShadow:"0 0 40px rgba(56,189,248,0.5)"}}>
          Flight Dispatcher<br/><span style={{color:"#38bdf8"}}>Quiz System</span>
        </h1>
        <p style={{color:"rgba(255,255,255,0.55)",fontSize:15,lineHeight:1.7,marginBottom:32}}>
          AI-adaptive examination covering{" "}
          <strong style={{color:"#38bdf8"}}>Navigation</strong>,{" "}
          <strong style={{color:"#818cf8"}}>Meteorology</strong>, and{" "}
          <strong style={{color:"#fbbf24"}}>Flight Dispatcher</strong> concepts under the EASA framework.
        </p>
        <div style={{display:"flex",gap:16,justifyContent:"center",flexWrap:"wrap",marginBottom:36}}>
          {[["10","Questions"],["10","Levels"],["AI","Adaptive"]].map(([v,l])=>(
            <div key={l} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,padding:"16px 24px",minWidth:90}}>
              <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:28,color:"#38bdf8",fontWeight:700}}>{v}</div>
              <div style={{color:"rgba(255,255,255,0.4)",fontSize:11,letterSpacing:1,textTransform:"uppercase"}}>{l}</div>
            </div>
          ))}
        </div>
        <button onClick={startQuiz} style={{background:"linear-gradient(135deg,#0ea5e9,#6366f1)",border:"none",borderRadius:12,padding:"16px 48px",color:"#fff",fontFamily:"'Orbitron',sans-serif",fontSize:14,fontWeight:700,letterSpacing:2,cursor:"pointer",animation:"pulseGlow 2s infinite"}}>
          BEGIN EXAMINATION
        </button>
      </div>
    </div>
  );

  // ── RESULTS ────────────────────────────────────────────────────
  if (screen === "result") {
    const pct = Math.round((score/10)*100);
    const grade = pct>=90?"DISTINGUISHED":pct>=70?"PROFICIENT":pct>=50?"COMPETENT":"NEEDS REVIEW";
    const gc = pct>=90?"#38bdf8":pct>=70?"#34d399":pct>=50?"#fbbf24":"#f87171";
    const topics = ["Navigation","Meteorology","Flight Dispatcher"].map(t=>({
      topic:t,
      correct:history.filter(h=>h.topic===t&&h.isCorrect).length,
      total:history.filter(h=>h.topic===t).length,
    }));
    return (
      <div style={{...bg,padding:24}}>
        <Stars/>
        <div style={{position:"relative",zIndex:1,maxWidth:680,width:"100%",animation:"fadeSlide 0.6s ease forwards"}}>
          <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:24,padding:"40px 36px",textAlign:"center"}}>
            <div style={{fontSize:56,marginBottom:8}}>🏆</div>
            <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:11,letterSpacing:5,color:"#38bdf8",marginBottom:12}}>EXAMINATION COMPLETE</div>
            <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:64,fontWeight:900,color:gc,textShadow:`0 0 30px ${gc}`,animation:"countUp 0.6s ease forwards",marginBottom:4}}>{pct}%</div>
            <div style={{color:gc,fontWeight:700,letterSpacing:3,fontSize:13,marginBottom:24}}>{grade}</div>
            <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:32,flexWrap:"wrap"}}>
              {[["Score",`${score}/10`],["Final Level",`${finalLevel}/10`]].map(([l,v])=>(
                <div key={l} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"14px 20px"}}>
                  <div style={{color:"#38bdf8",fontFamily:"'Orbitron',sans-serif",fontSize:22,fontWeight:700}}>{v}</div>
                  <div style={{color:"rgba(255,255,255,0.4)",fontSize:11,letterSpacing:1}}>{l}</div>
                </div>
              ))}
            </div>
            <div style={{marginBottom:32,textAlign:"left"}}>
              <div style={{color:"rgba(255,255,255,0.4)",fontSize:11,letterSpacing:2,textTransform:"uppercase",marginBottom:12,textAlign:"center"}}>Performance by Topic</div>
              {topics.map(({topic,correct,total})=> total > 0 ? (
                <div key={topic} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{color:"rgba(255,255,255,0.6)",fontSize:13}}>{topic}</span>
                    <span style={{color:"#fff",fontSize:13,fontWeight:600}}>{correct}/{total}</span>
                  </div>
                  <div style={{height:6,background:"rgba(255,255,255,0.07)",borderRadius:3}}>
                    <div style={{height:"100%",borderRadius:3,background:"linear-gradient(90deg,#38bdf8,#6366f1)",width:`${total?(correct/total)*100:0}%`,transition:"width 0.8s ease"}}/>
                  </div>
                </div>
              ) : null)}
            </div>
            <button onClick={()=>setScreen("intro")} style={{background:"linear-gradient(135deg,#0ea5e9,#6366f1)",border:"none",borderRadius:12,padding:"14px 40px",color:"#fff",fontFamily:"'Orbitron',sans-serif",fontSize:13,fontWeight:700,letterSpacing:2,cursor:"pointer"}}>
              RETAKE EXAM
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ── QUIZ ───────────────────────────────────────────────────────
  return (
    <div style={{...bg,padding:"24px 16px"}}>
      <Stars count={30}/>
      <div style={{position:"relative",zIndex:1,maxWidth:700,width:"100%"}}>
        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:11,color:"#38bdf8",letterSpacing:3}}>✈ EASA EXAM</div>
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            <span style={{color:"rgba(255,255,255,0.4)",fontSize:12}}>Q {questionNum+1}/10</span>
            <span style={{background:"rgba(56,189,248,0.1)",border:"1px solid rgba(56,189,248,0.3)",borderRadius:20,padding:"4px 12px",fontSize:12,fontFamily:"'Orbitron',sans-serif",color:"#38bdf8"}}>LVL {level}</span>
          </div>
        </div>

        <ProgressBar answered={questionNum}/>

        {/* Card */}
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:20,padding:"32px 28px",animation:animIn?"fadeSlide 0.5s ease forwards":"none"}}>
          {loadingQ ? (
            <div style={{textAlign:"center",padding:"60px 0"}}>
              <div style={{width:48,height:48,border:"3px solid rgba(56,189,248,0.2)",borderTopColor:"#38bdf8",borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto 16px"}}/>
              <div style={{color:"rgba(255,255,255,0.4)",fontFamily:"'Orbitron',sans-serif",fontSize:11,letterSpacing:2}}>GENERATING QUESTION…</div>
            </div>
          ) : error ? (
            <div style={{textAlign:"center",padding:"40px 0"}}>
              <div style={{color:"#f87171",marginBottom:16,lineHeight:1.6}}>{error}</div>
              <button onClick={()=>loadQuestion(level)} style={{background:"rgba(56,189,248,0.1)",border:"1px solid #38bdf8",borderRadius:8,padding:"10px 24px",color:"#38bdf8",cursor:"pointer",fontFamily:"'Exo 2',sans-serif"}}>Retry</button>
            </div>
          ) : currentQ && (
            <>
              <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:20}}>
                <TopicBadge topic={currentQ.topic}/>
                <span style={{color:"rgba(255,255,255,0.25)",fontSize:11}}>Difficulty {level}/10</span>
              </div>
              <p style={{color:"#fff",fontSize:17,lineHeight:1.7,marginBottom:28,fontWeight:500}}>{currentQ.question}</p>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {currentQ.options?.map((opt,i) => {
                  const letter = opt.charAt(0);
                  const isSel = selected === opt;
                  const isCorr = currentQ.correct === letter;
                  let bg2 = "rgba(255,255,255,0.04)", bdr = "rgba(255,255,255,0.1)", clr = "rgba(255,255,255,0.8)";
                  if (selected) {
                    if (isCorr) { bg2="rgba(52,211,153,0.12)"; bdr="#34d399"; clr="#34d399"; }
                    else if (isSel) { bg2="rgba(248,113,113,0.12)"; bdr="#f87171"; clr="#f87171"; }
                  }
                  return (
                    <button key={i} onClick={()=>submitAnswer(opt)} disabled={!!selected||loadingFB}
                      style={{background:bg2,border:`1px solid ${bdr}`,borderRadius:12,padding:"14px 18px",color:clr,fontSize:14,textAlign:"left",cursor:selected?"default":"pointer",transition:"all 0.25s",fontFamily:"'Exo 2',sans-serif",display:"flex",alignItems:"center",gap:12}}>
                      <span style={{fontFamily:"'Orbitron',sans-serif",fontSize:11,fontWeight:700,minWidth:24,color:selected?clr:"#38bdf8"}}>{letter}</span>
                      {opt.slice(3)}
                    </button>
                  );
                })}
              </div>
              {loadingFB && (
                <div style={{textAlign:"center",marginTop:16,color:"rgba(255,255,255,0.4)",fontSize:12}}>
                  <span style={{display:"inline-block",animation:"spin 0.8s linear infinite",marginRight:6}}>⚙</span>
                  Evaluating your answer…
                </div>
              )}
              {feedback && (
                <div style={{marginTop:20,padding:"16px 20px",borderRadius:12,background:feedback.correct?"rgba(52,211,153,0.07)":"rgba(248,113,113,0.07)",border:`1px solid ${feedback.correct?"#34d399":"#f87171"}`,animation:"fadeSlide 0.4s ease forwards"}}>
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
                    <span style={{fontSize:18}}>{feedback.correct?"✅":"❌"}</span>
                    <span style={{fontFamily:"'Orbitron',sans-serif",fontSize:11,fontWeight:700,letterSpacing:1,color:feedback.correct?"#34d399":"#f87171"}}>
                      {feedback.correct?"CORRECT":"INCORRECT"}
                    </span>
                  </div>
                  <p style={{color:"rgba(255,255,255,0.7)",fontSize:13,lineHeight:1.7}}>{feedback.text}</p>
                  <button onClick={nextQuestion} style={{marginTop:14,background:"linear-gradient(135deg,#0ea5e9,#6366f1)",border:"none",borderRadius:8,padding:"10px 28px",color:"#fff",fontFamily:"'Orbitron',sans-serif",fontSize:11,fontWeight:700,letterSpacing:2,cursor:"pointer"}}>
                    {questionNum+1>=10?"VIEW RESULTS →":"NEXT QUESTION →"}
                  </button>
                </div>
              )}
            </>
          )}
        </div>

        <div style={{display:"flex",justifyContent:"space-between",marginTop:16,padding:"0 4px"}}>
          <span style={{color:"rgba(255,255,255,0.3)",fontSize:12}}>Score: {score}/{questionNum+(feedback?1:0)}</span>
          <span style={{color:"rgba(255,255,255,0.3)",fontSize:12}}>Level {level}/10</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<QuizApp/>);
</script>
</body>
</html>
